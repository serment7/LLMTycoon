<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>LLMTycoon — 오프라인</title>
<style>
  :root {
    color-scheme: dark light;
    font-family: system-ui, -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
  }
  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    background: #1a1a2e;
    color: #f4f4fb;
    padding: 24px;
  }
  main {
    max-width: 480px;
    width: 100%;
    background: #16213e;
    border: 2px solid #4e4e6a;
    border-left: 6px solid #00d2ff;
    padding: 24px;
  }
  h1 { font-size: 16px; margin: 0 0 12px; color: #00d2ff; text-transform: uppercase; letter-spacing: 2px; }
  p { font-size: 13px; line-height: 1.6; margin: 0 0 8px; color: rgba(244,244,251,0.8); }
  button { margin-top: 16px; padding: 8px 14px; font-size: 11px; font-weight: bold; text-transform: uppercase; background: #00d2ff; color: #000; border: 1px solid #00d2ff; cursor: pointer; }
</style>
</head>
<body>
<main role="status" aria-live="polite">
  <h1>지금은 오프라인이에요</h1>
  <p>네트워크 연결이 일시적으로 끊겼습니다. 이전에 방문한 화면은 캐시에서 볼 수 있고, 새 데이터가 필요한 경로는 연결이 돌아오면 자동으로 이어집니다.</p>
  <p>연결이 돌아오면 새로고침해 주세요.</p>
  <button type="button" onclick="location.reload()">다시 시도</button>
</main>
</body>
</html>
